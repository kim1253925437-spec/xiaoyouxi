<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>小鸡下蛋</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main class="game" id="game">
    <section class="scene" aria-label="小鸡下蛋小游戏">
      <div class="sky-decor" aria-hidden="true">
        <span class="sun"></span>
        <span class="cloud cloud-one"></span>
        <span class="cloud cloud-two"></span>
        <span class="cloud cloud-three"></span>
        <span class="tree tree-left"></span>
        <span class="tree tree-right"></span>
        <span class="house"></span>
      </div>

      <div class="home-panel" id="homePanel">
        <p class="kicker">Chicken Egg Game</p>
        <h1>小鸡下蛋</h1>
        <button class="start-button" id="startButton" type="button">开始游戏</button>
      </div>

      <header class="topbar" id="topbar" hidden>
        <div>
          <p id="roundLabel">第 1 轮</p>
          <h2 id="stageTitle">点点小动物</h2>
        </div>
        <div class="counter" aria-live="polite">
          <span id="counterLabel">动物</span>
          <strong id="counterValue">0/10</strong>
        </div>
      </header>

      <div class="playfield" id="playfield" aria-live="polite"></div>

      <div class="toast" id="toast" hidden>太棒啦！再来一次！</div>

      <div class="meadow" aria-hidden="true">
        <span class="flower flower-a"></span>
        <span class="flower flower-b"></span>
        <span class="flower flower-c"></span>
        <span class="grass grass-a"></span>
        <span class="grass grass-b"></span>
        <span class="grass grass-c"></span>
      </div>
    </section>

    <aside class="rotate-tip" aria-live="assertive">
      <div class="phone-shape"></div>
      <p>请旋转手机横屏体验</p>
    </aside>
  </main>

  <script src="./js/main.js"></script>
</body>
</html>
